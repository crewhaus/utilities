name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (@crewhaus/* workspaces)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ">=1.2.0"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Root "test" fans out to every @crewhaus/* workspace package.
      # No typecheck/lint step: utilities has no root typecheck/lint script
      # nor a biome config, so adding them would fail rather than gate.
      - name: Test
        run: bun run test
